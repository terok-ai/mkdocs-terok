# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
#
# Coverage handoff contract (well-known address):
#   workflow=ci.yml  job=test  artifact=coverage  contains reports/coverage.{json,xml}
#
# reports/coverage.json drives mkdocs-terok's own coverage treemap. The CI
# workflow's test job already produces it, so this build downloads that
# artifact instead of paying for a second pytest run. The coverage JSON
# itself is throwaway: only the rendered SVG is published.
#
# This workflow is master-only (deploys to GitHub Pages); we always require
# the same-SHA CI run to have completed successfully before pulling the
# artifact, so the published treemap matches the published code.
name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:
  # release.yml calls this after a successful PyPI publish: the same build
  # runs on the tag ref and lands in the versioned tree as /<minor>/ with
  # the `latest` alias, instead of /dev/.
  workflow_call:
    inputs:
      release:
        description: "Publish as the release version derived from the tag ref (instead of dev)"
        type: boolean
        default: false

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'terok-ai/mkdocs-terok' && (github.ref == 'refs/heads/master' || inputs.release)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install scc
        env:
          SCC_SHA256: 6c31f4d0cf3b7a8c5ca910fa4e451949434798f6541ec5dea4b83f4973e13772
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/scc.tar.gz \
            "https://github.com/boyter/scc/releases/download/v3.5.0/scc_Linux_x86_64.tar.gz"
          echo "${SCC_SHA256}  /tmp/scc.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/scc.tar.gz -C /usr/local/bin scc

      - name: Install dependencies
        # Dropped the `test` group: this workflow no longer runs pytest; the
        # `coverage` artifact below carries everything the treemap needs.
        run: poetry install --with docs --no-interaction

      # Wait for ci.yml's run on this commit to finish. CI is fast (no
      # third-party services on the critical path), so this normally returns
      # within seconds when the workflows are triggered together by a master
      # push. Failing CI fails the docs deploy — published treemap must agree
      # with published code.
      - name: Wait for CI on this commit
        uses: actions/github-script@v9
        with:
          script: |
            const deadline = Date.now() + 20 * 60 * 1000;
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: context.sha,
                per_page: 5,
              });
              const run = data.workflow_runs[0];
              if (run?.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info(`CI succeeded for ${context.sha}`);
                  return;
                }
                core.setFailed(
                  `CI ${run.conclusion} for ${context.sha} — refusing to publish docs with a mismatched treemap`
                );
                return;
              }
              core.info(`CI for ${context.sha}: ${run?.status ?? 'not yet started'} — waiting`);
              await sleep(20_000);
            }
            core.setFailed('Timed out after 20m waiting for CI')

      - name: Coverage artifact (same SHA, required)
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: ci.yml
          workflow_conclusion: success
          commit: ${{ github.sha }}
          name: coverage
          path: reports
          if_no_artifact_found: fail

      - name: Build documentation
        run: poetry run properdocs build --strict

      - name: Upload site for versioned publish
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: site/

  # A release call ships the built site as an immutable snapshot asset on
  # the tag's GitHub release; the assembler serves it as /<minor>/ from
  # here on.  Final vX.Y.Z tags only: alphas never reach pypi-publish, so
  # a non-final ref here is a mis-dispatch and fails loudly.
  attach:
    if: inputs.release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require a final release tag
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release docs publish requires a final v*.*.* tag ref (got: $GITHUB_REF_NAME)" >&2
            exit 1
          fi

      - uses: actions/download-artifact@v8
        with:
          name: docs-site
          path: site

      - name: Upload snapshot to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tar -czf docs-site.tar.gz -C site .
          gh release upload "$GITHUB_REF_NAME" docs-site.tar.gz --clobber --repo "$GITHUB_REPOSITORY"

  # Local reference: this repo ships the reusable workflow, so it consumes
  # its own copy — consumers pin it by tag instead.  Runs after attach on
  # the release path so the fresh snapshot is in the release list; attach
  # is skipped on master pushes.
  publish:
    if: >-
      !cancelled() && needs.build.result == 'success' &&
      (needs.attach.result == 'success' || needs.attach.result == 'skipped') &&
      github.repository == 'terok-ai/mkdocs-terok' && (github.ref == 'refs/heads/master' || inputs.release)
    needs: [build, attach]
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/publish-versioned-docs.yml
