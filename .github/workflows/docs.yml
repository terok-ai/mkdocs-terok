# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'terok-ai/mkdocs-terok' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install scc
        env:
          SCC_SHA256: 6c31f4d0cf3b7a8c5ca910fa4e451949434798f6541ec5dea4b83f4973e13772
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/scc.tar.gz \
            "https://github.com/boyter/scc/releases/download/v3.5.0/scc_Linux_x86_64.tar.gz"
          echo "${SCC_SHA256}  /tmp/scc.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/scc.tar.gz -C /usr/local/bin scc

      - name: Install dependencies
        run: poetry install --with docs --no-interaction

      - name: Download Codecov treemap SVG
        run: |
          mkdir -p reports
          curl -fsSLo reports/coverage_treemap.svg \
            "https://codecov.io/gh/terok-ai/mkdocs-terok/graphs/tree.svg?token=${CODECOV_TOKEN}" \
            || echo '<svg xmlns="http://www.w3.org/2000/svg"><text y="20">Treemap unavailable</text></svg>' > reports/coverage_treemap.svg
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build documentation
        run: poetry run mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    if: github.repository == 'terok-ai/mkdocs-terok' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
