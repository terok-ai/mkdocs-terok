# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  reuse:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  lint:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Ruff lint
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: format --check

      - name: ASCII-only pyproject
        run: |
          ! LC_ALL=C grep -nP '[^\x00-\x7F]' pyproject.toml

      # Stdlib-only (tomllib + re); ubuntu-latest's stock python3 is 3.12+,
      # tomllib is stdlib since 3.11 — no setup-python step needed.
      - name: README install snippet ↔ pyproject version
        run: python3 scripts/check-readme-version.py

  docstring-coverage:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check docstring coverage
        run: docstr-coverage src/mkdocs_terok/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check for dead code
        run: vulture src/mkdocs_terok/ --min-confidence 80

  test:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Run tests
        run: make test

      - name: Generate coverage JSON (treemap input)
        # docs.yml consumes reports/coverage.json to render mkdocs-terok's
        # own coverage treemap. `coverage json` reads the .coverage data file
        # produced by `make test` above, so this does NOT re-run the test
        # suite — it just serialises the existing coverage data.
        run: poetry run coverage json -o reports/coverage.json

      - name: Upload coverage artifact
        # Consumed by docs.yml's master deploy via dawidd6/action-download-artifact.
        # Same well-known-address contract as the sibling repos: workflow=ci.yml
        # job=test artifact=coverage contains reports/coverage.{json,xml}.
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            reports/coverage.xml
            reports/coverage.json
          retention-days: 1

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: reports/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-build:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install scc
        env:
          SCC_SHA256: 6c31f4d0cf3b7a8c5ca910fa4e451949434798f6541ec5dea4b83f4973e13772
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/scc.tar.gz \
            "https://github.com/boyter/scc/releases/download/v3.5.0/scc_Linux_x86_64.tar.gz"
          echo "${SCC_SHA256}  /tmp/scc.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/scc.tar.gz -C /usr/local/bin scc

      - name: Install dependencies
        run: poetry install --with docs --no-interaction

      - name: Build documentation
        run: poetry run properdocs build --strict

      - name: Upload docs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docs-preview
          path: site/
          retention-days: 7

  readme-check:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify README renders for PyPI
        run: |
          pip install 'readme_renderer[md]'
          python -m readme_renderer README.md --format md
