# Pin third-party actions to full commit SHAs for supply-chain security.
# GitHub-owned actions (actions/*) may use version tags.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  reuse:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: REUSE compliance check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6

  lint:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ruff lint
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3
        with:
          args: format --check

  docstring-coverage:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check docstring coverage
        run: docstr-coverage src/mkdocs_terok/ --fail-under=95

  dead-code:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install -r .github/requirements-ci.txt

      - name: Check for dead code
        run: vulture src/mkdocs_terok/ --min-confidence 80

  test:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Run tests
        run: make test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: reports/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-build:
    if: github.repository == 'terok-ai/mkdocs-terok'
    runs-on: ubuntu-latest
    concurrency:
      group: docs-build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dynamic versioning plugin
        run: poetry self add "poetry-dynamic-versioning[plugin]>=1.0.0,<2.0.0"

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/pyproject.toml', '**/poetry.lock') }}

      - name: Install scc
        env:
          SCC_SHA256: 6c31f4d0cf3b7a8c5ca910fa4e451949434798f6541ec5dea4b83f4973e13772
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/scc.tar.gz \
            "https://github.com/boyter/scc/releases/download/v3.5.0/scc_Linux_x86_64.tar.gz"
          echo "${SCC_SHA256}  /tmp/scc.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/scc.tar.gz -C /usr/local/bin scc

      - name: Install dependencies
        run: poetry install --with docs --no-interaction

      - name: Build documentation
        run: poetry run mkdocs build --strict

      - name: Upload docs artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: site/
          retention-days: 7
