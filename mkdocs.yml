site_name: mkdocs-terok
site_description: Shared MkDocs documentation generators for terok projects
repo_url: https://github.com/terok-ai/mkdocs-terok
repo_name: terok-ai/mkdocs-terok

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
        - docs/gen_ci_map.py
        - docs/gen_quality_report.py
        - docs/gen_test_map.py
        - docs/gen_config_reference.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

extra_css:
  - _assets/extra.css

nav:
  - Home: index.md
  - API Reference: reference/
  - CI Map: ci-map.md
  - Quality Report: quality-report.md
  - Test Map: test-map.md
  - Config Reference Demo: config-reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
