site_name: mkdocs-terok
site_description: Shared MkDocs documentation generators for terok projects
repo_url: https://github.com/terok-ai/mkdocs-terok
repo_name: terok-ai/mkdocs-terok

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - terok:
      ci_map: true
      quality_report: true
      quality_report_codecov_treemap_path: reports/coverage_treemap.svg
      quality_report_codecov_repo: terok-ai/mkdocs-terok
      test_map: true
      test_map_show_markers: false
      test_map_title: "Test Suite Map"
      test_map_integration_dir: tests
      ref_pages: true
      ref_pages_skip_patterns:
        - __main__
        - resources
        - _assets
  - gen-files:
      scripts:
        - docs/gen_config_reference.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference: reference/
  - CI Map: ci-map.md
  - Quality Report: quality-report.md
  - Test Map: test-map.md
  - Config Reference Demo: config-reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
