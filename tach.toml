exact = true
source_roots = ["src"]

# Generators (no doc-engine import)
[[modules]]
path = "mkdocs_terok"
depends_on = []

# Plugin (imports properdocs + generators)
[[modules]]
path = "mkdocs_terok.plugin"
depends_on = [{ path = "mkdocs_terok" }]

[[interfaces]]
from = ["mkdocs_terok"]
expose = [
  "INVENTORY_ONLY_ENV",
  "brand_css_path",
  "mermaid_zoom_js_path",
  "ci_map",
  "ci_map.load_workflows",
  "ci_map.generate_ci_map",
  "test_map",
  "test_map.TestMapConfig",
  "test_map.collect_tests",
  "test_map.generate_test_map",
  "code_metrics",
  "code_metrics.CodeMetricsConfig",
  "code_metrics.CodeMetricsResult",
  "code_metrics.generate_code_metrics",
  "module_map",
  "module_map.ModuleMapConfig",
  "module_map.generate_module_map",
  "ref_pages",
  "ref_pages.RefPagesConfig",
  "ref_pages.generate_ref_pages",
  "config_reference",
  "config_reference.render_model_tables",
  "config_reference.render_yaml_example",
  "config_reference.render_json_schema",
  "inventory",
  "inventory.build_inventory",
]

[[interfaces]]
from = ["mkdocs_terok.plugin"]
expose = [
  "TerokPlugin",
  "TerokPluginConfig",
]
